# -*- coding: utf-8 -*-
# Project Root File Policy - Prevents root directory pollution
#
# USAGE: Copy this to 'project-root-criteria.yaml' and customize per project
#        cp project-root-pollution-criteria-example.yaml project-root-criteria.yaml
#
# This file is PROJECT-SPECIFIC and won't be overwritten by sync

# Mode: strict = whitelist only (everything else blocked)
#       lenient = blacklist only (block specific patterns)
mode: strict

# Files explicitly allowed in project root (exact match)
whitelist:
  # Documentation
  - README.md
  - README.rst
  - README
  - LICENSE
  - LICENSE.txt
  - LICENSE.md
  - CHANGELOG.md
  - CHANGELOG
  - CONTRIBUTING.md
  - AUTHORS
  - AUTHORS.md
  - HISTORY.md
  - SECURITY.md

  # Python
  - pyproject.toml
  - setup.py
  - setup.cfg
  - requirements.txt
  - requirements-dev.txt
  - MANIFEST.in
  - tox.ini
  - noxfile.py
  - pytest.ini
  - conftest.py

  # JavaScript/TypeScript
  - package.json
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml
  - tsconfig.json
  - jsconfig.json
  - webpack.config.js
  - vite.config.js
  - vite.config.ts
  - rollup.config.js
  - babel.config.js
  - jest.config.js
  - vitest.config.ts

  # Rust
  - Cargo.toml
  - Cargo.lock

  # Go
  - go.mod
  - go.sum

  # Ruby
  - Gemfile
  - Gemfile.lock
  - Rakefile

  # Build
  - Makefile
  - CMakeLists.txt
  - meson.build
  - Justfile
  - Taskfile.yml

  # Docker
  - Dockerfile
  - docker-compose.yml
  - docker-compose.yaml
  - compose.yml
  - compose.yaml

  # Shell entry points
  - run_tests.sh
  - run_pytest.sh

# Patterns allowed (glob-style, applied to basename)
whitelist_patterns:
  # Dotfiles and dotdirs are generally config - allow
  - ".*"
  # Common config extensions
  - "*.toml"
  - "*.cfg"
  - "*.ini"
  # Dockerfile variants
  - "Dockerfile.*"
  - "*.dockerfile"

# Suggested relocations for blocked files
# Shown in error message to guide proper placement
relocations:
  # Logs
  "*.log": "./logs/"
  "*.log.*": "./logs/"

  # Temporary files
  "*.tmp": "./.tmp/"
  "*.temp": "./.tmp/"
  "*.bak": "./.tmp/"
  "*.swp": "./.tmp/"
  "*~": "./.tmp/"

  # Claude/AI working files
  "TODO.md": "./.claude/"
  "TODOS.md": "./.claude/"
  "NOTES.md": "./.claude/"
  "PLANNING.md": "./.claude/"
  "SCRATCH.md": "./.claude/"

  # Data files (should be in data/)
  "*.csv": "./data/"
  "*.json": "./data/ or ./config/"
  "*.yaml": "./config/"
  "*.yml": "./config/"

  # Output files
  "*.out": "./output/"
  "*.result": "./output/"

  # Default suggestion
  "_default": "./.claude/ or appropriate subdirectory"

# Custom error messages for specific files
# Use this for deprecated patterns or special guidance
custom_messages:
  # Python packaging
  "setup.py": "Use pyproject.toml instead (PEP 517/518)"
  "setup.cfg": "Use pyproject.toml instead (PEP 517/518)"
  "requirements.txt": "Consider using pyproject.toml [project.dependencies]"

  # JavaScript
  "bower.json": "Bower is deprecated. Use npm/yarn instead"
  "Gruntfile.js": "Consider modern alternatives: npm scripts, vite, esbuild"
  "gulpfile.js": "Consider modern alternatives: npm scripts, vite, esbuild"

  # Misc
  ".travis.yml": "Consider GitHub Actions (.github/workflows/)"
  "Vagrantfile": "Consider Docker/containers instead"

  # Working files that pollute root
  "TODO.md": "Working notes should go in .claude/ directory"
  "NOTES.md": "Working notes should go in .claude/ directory"
  "SCRATCH.md": "Scratch files should go in .claude/ directory"

  # ML library artifacts
  "catboost_info": "CatBoost artifacts - use train_dir parameter: CatBoostClassifier(train_dir='./logs/catboost')"
  "catboost_info/*": "CatBoost artifacts - use train_dir parameter: CatBoostClassifier(train_dir='./logs/catboost')"
  "mlruns": "MLflow artifacts - set MLFLOW_TRACKING_URI or use mlflow.set_tracking_uri('./logs/mlflow')"
  "wandb": "W&B artifacts - set WANDB_DIR environment variable"
  "lightning_logs": "PyTorch Lightning - use Trainer(default_root_dir='./logs')"

# EOF