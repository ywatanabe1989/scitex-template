# Timestamp: "2026-01-04 (ywatanabe)"
# File: ./.claude/hooks/project-switch/switch-example.yaml
#
# CENTRALIZED Hook Control - Controls ALL hook types in one file
# Usage: cp switch-example.yaml switch.yaml
#
# IMPORTANT: Use just the filename (e.g., check_line_number_limit.sh), not the full path
# Note: switch.yaml is project-specific and won't be overwritten by sync

on:
  # Pre-tool-use hooks
  limit_line_numbers.sh

  # Post-tool-use hooks
  ensure_executable.sh
  run_lint.sh

  # Notification hooks
  notify_voice.sh

off:
  # Pre-tool-use hooks
  inhibit_project_root_pollution.sh

  # Post-tool-use hooks
  run_tests.sh
  format_code.sh

  # Notification hooks
  notify_email.sh
  notify_voice_v01-no-project-in-transcription.sh
  notify_voice_v02-no-project-in-transcription.sh

# You can organize by hook type for clarity, but it's not required
# The helper will check this file from any hook directory

